<!DOCTYPE html><html lang="zh-Hant" data-theme="dark"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#14161b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="足球推介">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>足球推介</title>
<style>
:root,[data-theme="dark"]{
 --bg:#14161b;--surface:#1b1e25;--surface2:#232831;--border:#2b303a;
 --text:#e7e9ee;--muted:#959ba7;--faint:#646b78;
 --accent:#5b8def;--accent-soft:rgba(91,141,239,.13);
 --green:#42b07e;--green-soft:rgba(66,176,126,.13);
 --red:#dd6178;--red-soft:rgba(221,97,120,.13);
 --amber:#cf9b3e;--amber-soft:rgba(207,155,62,.13);
 --shadow:0 1px 2px rgba(0,0,0,.35),0 6px 18px rgba(0,0,0,.30);
 --b1:#5b8def;--b2:#4c5360;--b3:#363c47;
}
[data-theme="light"]{
 --bg:#f3f4f6;--surface:#ffffff;--surface2:#f1f3f6;--border:#e1e4ea;
 --text:#1b1f27;--muted:#646b76;--faint:#9aa0ab;
 --accent:#2f6fe0;--accent-soft:rgba(47,111,224,.10);
 --green:#1f9d63;--green-soft:rgba(31,157,99,.11);
 --red:#cf4d68;--red-soft:rgba(207,77,104,.10);
 --amber:#b9831c;--amber-soft:rgba(185,131,28,.12);
 --shadow:0 1px 2px rgba(22,32,52,.05),0 5px 16px rgba(22,32,52,.07);
 --b1:#3a7bd5;--b2:#c5cad3;--b3:#9aa1ad;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang TC","PingFang HK","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.55;padding:22px 16px 56px;-webkit-font-smoothing:antialiased}
.wrap{max-width:740px;margin:0 auto}
.ico{display:inline-flex;align-items:center;justify-content:center;vertical-align:-3px}
.ico svg{width:100%;height:100%;display:block}
/* 分段控制 tabs */
.tabs{display:flex;border:1px solid var(--border);background:var(--surface);margin-bottom:16px;box-shadow:var(--shadow);overflow-x:auto}
.tab{flex:1;text-align:center;padding:12px 6px;color:var(--muted);font-size:14.5px;font-weight:500;cursor:pointer;background:none;border:none;border-right:1px solid var(--border);font-family:inherit;display:flex;align-items:center;justify-content:center;white-space:nowrap;min-width:58px}
.tab:last-child{border-right:none}
.tab.on{color:var(--text);background:var(--surface2);font-weight:600}
.tab.icontab{flex:0 0 46px;color:var(--muted);min-width:46px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-bottom:18px;padding:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:var(--shadow)}
.btn:hover{background:var(--surface2)}
.empty{background:var(--surface);border:1px solid var(--border);padding:34px 20px;text-align:center;color:var(--muted);box-shadow:var(--shadow);font-size:14px}
/* 列表卡(等高) */
.mcard{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);padding:15px 18px;margin-bottom:14px;cursor:pointer;min-height:98px;display:flex;flex-direction:column;justify-content:center;transition:transform .1s,border-color .12s}
.mcard:hover{border-color:var(--accent);transform:translateY(-1px)}
.mc-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
.mc-team{font-size:15.5px;font-weight:600}.vs{color:var(--faint);font-weight:400;font-size:13px;margin:0 2px}
.mc-time{font-size:12.5px;color:var(--muted)}
.mc-pick{display:flex;align-items:center;gap:13px}
.pill{font-size:11.5px;font-weight:600;padding:3px 9px;white-space:nowrap}
.vtag{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 7px;margin:0 4px;background:var(--green-soft);color:var(--green);border:1px solid var(--green);vertical-align:1px}
.pill.steady{background:var(--green-soft);color:var(--green)}
.pill.cold{background:var(--amber-soft);color:var(--amber)}
.pill.corner{background:var(--accent-soft);color:var(--accent)}
.mc-sel{flex:1;min-width:0}.sel-txt{font-size:15px;font-weight:600}.odds{color:var(--muted);font-weight:400;font-size:13px}
.bar{height:5px;background:var(--surface2);overflow:hidden;margin-top:7px}
.bar-fill{height:100%}
.mc-stake{text-align:right;white-space:nowrap}.stk-lbl{font-size:11.5px;color:var(--muted)}.stk-amt{font-size:18px;font-weight:700}
/* overlay / detail */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-start;justify-content:center;padding:46px 14px 30px;overflow-y:auto;z-index:50}
.overlay.show{display:flex}
.hint{position:fixed;top:0;left:0;right:0;text-align:center;color:#cfd3da;font-size:12.5px;padding:12px;pointer-events:none;display:flex;align-items:center;justify-content:center;gap:6px}
.detail{width:100%;max-width:600px;background:var(--surface);border:1px solid var(--border);box-shadow:0 10px 40px rgba(0,0,0,.4);padding:20px 22px}
.d-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.d-team{font-size:19px;font-weight:700}.d-time{font-size:13px;color:var(--muted)}
.betbox{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px;border-left:3px solid transparent}
.betbox.steady{background:var(--green-soft);border-left-color:var(--green)}
.betbox.cold{background:var(--amber-soft);border-left-color:var(--amber)}
.betbox.corner{background:var(--accent-soft);border-left-color:var(--accent)}
.betbox .bb-sel{flex:1;font-size:15.5px;font-weight:600}.betbox .bb-sub{font-size:12.5px;font-weight:400;opacity:.85}
.betbox.steady .bb-sel{color:var(--green)}.betbox.cold .bb-sel{color:var(--amber)}.betbox.corner .bb-sel{color:var(--accent)}
.betbox .bb-amt{text-align:right;white-space:nowrap}.bb-amt .a{font-size:18px;font-weight:700}.bb-amt .l{font-size:11px;opacity:.85}
.sec-h{font-size:13px;font-weight:600;color:var(--muted);margin:18px 0 9px}
.sec-h .tag{font-size:11px;font-weight:400;color:var(--faint)}
.modrow{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:7px;gap:8px}
.modrow b{color:var(--text);font-weight:600}
.bar3{display:flex;height:8px;overflow:hidden;background:var(--surface2)}
.bar3>div{height:100%}
.modline{display:flex;gap:20px;margin-top:12px;font-size:13px;color:var(--muted);flex-wrap:wrap}
.modline b{color:var(--text);font-weight:600}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.col{background:var(--surface2);padding:11px 13px}
.col .ch{font-size:12px;color:var(--muted);margin-bottom:7px}
.col .cr{font-size:13px;display:flex;justify-content:space-between;padding:2px 0}
.col .cr span:last-child{color:var(--muted)}
.note{border:1px solid var(--border);padding:9px 13px;margin-bottom:8px}
.note-h{font-size:12px;font-weight:600;margin-bottom:3px}
.note-b{font-size:13px;color:var(--text);opacity:.92;line-height:1.6}
.note-b a{color:var(--accent);text-decoration:none}
.note-empty{border:1px dashed var(--border);padding:12px 14px;font-size:13px;color:var(--muted);line-height:1.6}
.note-opus{border-color:var(--accent);background:var(--accent-soft)}
.opick{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:13.5px}
.op-sel{flex:1;color:var(--text);font-weight:500}
.op-conf{font-size:11px;color:var(--muted);border:1px solid var(--border);padding:1px 7px}
.op-stk{font-weight:700;color:var(--green)}
.op-reason{font-size:12px;color:var(--muted);padding:0 0 6px;line-height:1.55}
.rbtn{margin-top:10px;width:100%;padding:11px;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.rbtn:hover{filter:brightness(1.08)}
.rbtn:disabled{cursor:default;opacity:.85}
.rbtn-ok{border-color:var(--green);color:var(--green);background:var(--green-soft)}
.oddrow{display:flex;align-items:center;gap:10px;padding:7px 11px;border:1px solid var(--border);margin-bottom:5px;font-size:12.5px}
.oddrow .o-mk{flex:1;font-weight:500}.oddrow .o-v{color:var(--muted)}
.o-tag{font-size:11.5px;font-weight:600;padding:2px 8px;white-space:nowrap}
.o-tag.cheap{background:var(--amber-soft);color:var(--amber)}.o-tag.dear{background:var(--red-soft);color:var(--red)}.o-tag.fair{background:var(--surface2);color:var(--muted)}
.pngbtn{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;width:100%;padding:11px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.pngbtn:hover{background:var(--border)}
/* 成績 */
.strip{display:flex;gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);padding:13px 16px}
.kpi.big{flex:2}.kpi.sm{flex:1}
.kpi .l{color:var(--muted);font-size:12px}
.kpi .v{font-size:23px;font-weight:700;margin-top:3px}
.kpi .x{font-size:12px;color:var(--muted);font-weight:400}
.chips{display:flex;flex-wrap:wrap;gap:9px;margin:13px 0}
.chip{background:var(--surface);border:1px solid var(--border);padding:8px 12px;font-size:12.5px;color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);padding:17px 19px;margin-bottom:14px}
.card h3{font-size:16px;font-weight:600;margin-bottom:5px}
.rtable{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.rtable th{text-align:left;color:var(--muted);font-weight:500;padding:9px 7px;border-bottom:1px solid var(--border)}
.rtable td{padding:11px 7px;border-bottom:1px solid var(--border)}
.rtable tr:last-child td{border-bottom:none}
.num{text-align:right;font-variant-numeric:tabular-nums}
.win{color:var(--green);font-weight:700}.lose{color:var(--red);font-weight:700}.muted2{color:var(--muted)}
details{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);padding:13px 17px;margin-top:8px}
summary{cursor:pointer;font-size:13.5px;font-weight:600;color:var(--muted);list-style:none}
details .adv{font-size:13px;color:var(--text);opacity:.9;margin-top:11px;line-height:1.75}
.note-fine{font-size:12px;color:var(--muted);margin:-4px 0 14px;line-height:1.6}
.cfill{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--border);font-size:13.5px}
.cf-m{flex:1}
.cf-in{width:112px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 9px;font-size:13px;font-family:inherit}
.cf-btn{background:var(--accent);color:#fff;border:none;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.cf-btn:hover{filter:brightness(1.08)}
/* 圖表 */
.chartbox{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);padding:15px 17px;margin-bottom:14px}
.chartbox .ch-t{font-size:13.5px;font-weight:600;margin-bottom:2px}
.chartbox .ch-s{font-size:11.5px;color:var(--muted);margin-bottom:10px}
.chartbox svg{width:100%;height:auto;display:block}
.legend{display:flex;gap:14px;font-size:11.5px;color:var(--muted);margin-top:7px}
.legend i{display:inline-block;width:10px;height:10px;margin-right:5px;vertical-align:-1px}
/* 賽程 */
.srow{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);padding:11px 14px;margin-bottom:9px;font-size:13.5px}
.srow.click{cursor:pointer}
.srow.click:hover{border-color:var(--accent)}
.s-time{width:76px;color:var(--muted);font-size:12px;flex-shrink:0}
.s-team{flex:1;min-width:0;font-weight:600}
.s-team .sub{font-weight:400;font-size:11.5px;color:var(--muted)}
.s-mid{width:120px;flex-shrink:0}
.s-right{text-align:right;white-space:nowrap;flex-shrink:0;font-size:12.5px}
.s-right .sc{font-size:15px;font-weight:700}
.sbar{display:flex;height:5px;overflow:hidden;background:var(--surface2);margin-top:5px}
.sbar>div{height:100%}
.delta-dn{color:var(--green);font-weight:600}
.delta-up{color:var(--amber);font-weight:600}
.sgroup{font-size:13px;font-weight:600;color:var(--muted);margin:18px 2px 10px}
.revtxt{background:var(--surface2);border-left:3px solid var(--b2);padding:9px 12px;margin:-4px 0 9px;font-size:12.5px;color:var(--text);opacity:.92;line-height:1.6}
.abtn{border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11.5px;font-weight:600;padding:4px 10px;cursor:pointer;font-family:inherit;white-space:nowrap}
.abtn:hover{color:var(--text)}
.abtn:disabled{opacity:.7;cursor:default}
/* 情報牆 */
.wcard{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);padding:15px 17px;margin-bottom:13px}
.w-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.w-team{font-size:15px;font-weight:700}
.w-meta{font-size:11.5px;color:var(--muted)}
.w-chiprow{display:flex;flex-wrap:wrap;gap:7px;margin:7px 0}
.wchip{font-size:11.5px;padding:2px 9px;background:var(--accent-soft);color:var(--accent);font-weight:600}
.w-body{font-size:13px;color:var(--text);opacity:.9;line-height:1.65}
.w-news{margin-top:8px;font-size:12.5px;line-height:1.7}
.w-news a{color:var(--accent);text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* 球隊庫 */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tcard{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);padding:14px 16px;cursor:pointer;transition:border-color .12s}
.tcard:hover{border-color:var(--accent)}
.t-name{font-size:15px;font-weight:700}
.t-en{font-size:11px;color:var(--faint);margin-bottom:8px}
.t-stats{display:flex;gap:16px;font-size:12px;color:var(--muted)}
.t-stats b{display:block;font-size:17px;color:var(--text);font-weight:700}
.t-inj{margin-top:8px;font-size:11.5px;color:var(--red)}
.t-ok{margin-top:8px;font-size:11.5px;color:var(--muted)}
.xtable{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
.xtable td{padding:6px 6px;border-bottom:1px solid var(--border)}
.xtable tr:last-child td{border-bottom:none}
.xtable .pos{color:var(--muted);width:52px;font-size:12px}
.xtable .ca{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
/* admin */
.comprow{display:flex;align-items:center;gap:11px;padding:10px 8px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border)}
.comprow:hover{background:var(--surface2)}
.cb{width:17px;height:17px;border:1.5px solid var(--muted);display:inline-flex;align-items:center;justify-content:center;color:transparent}
.comprow.on .cb{border-color:var(--accent);color:var(--accent)}
.cc{font-size:11px;font-weight:700;color:var(--muted);min-width:46px;letter-spacing:.03em}
.comprow.on .cc{color:var(--accent)}
.cn{flex:1;font-weight:500}.cnum{font-size:12px;color:var(--muted)}
.aitable{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.aitable th{text-align:left;color:var(--muted);font-weight:500;padding:8px 7px;border-bottom:1px solid var(--border);font-size:12px}
.aitable td{padding:9px 7px;border-bottom:1px solid var(--border);vertical-align:top}
.aitable tr:last-child td{border-bottom:none}
.mtag{font-size:11.5px;font-weight:700;padding:2px 9px;white-space:nowrap}
.mtag.hk{background:var(--surface2);color:var(--muted)}
.mtag.sn{background:var(--accent-soft);color:var(--accent)}
.mtag.op{background:var(--green-soft);color:var(--green)}
/* needbox */
.needbox{position:fixed;top:14px;right:14px;width:304px;max-height:82vh;overflow-y:auto;background:var(--surface);border:1px solid var(--amber);padding:13px 15px;z-index:60;box-shadow:0 10px 36px rgba(0,0,0,.45)}
.nb-h{font-size:13.5px;font-weight:700;color:var(--amber);margin-bottom:11px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.nb-x{cursor:pointer;color:var(--muted)}
.nb-item{border-top:1px solid var(--border);padding:11px 0}
.nb-match{font-size:13.5px;font-weight:600;margin-bottom:8px}
.nb-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px}
.nb-row label{color:var(--muted);min-width:82px}
.nb-row input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 9px;font-size:13px;font-family:inherit;width:100%}
.nb-act{display:flex;align-items:center;gap:8px;margin-top:7px}
.nb-search{flex:1;font-size:12.5px;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:5px}
.nb-act button{background:var(--amber);color:#1a1400;border:none;padding:7px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
/* loadbox */
.loadbox{position:fixed;inset:0;background:var(--bg);opacity:.985;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:80;gap:18px}
.loadbox.show{display:flex}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.load-step{font-size:15px;color:var(--text);font-weight:500;text-align:center;max-width:340px;padding:0 20px}
.load-bar{width:260px;height:7px;background:var(--surface2);overflow:hidden}
.load-bar-fill{height:100%;background:var(--accent);transition:width .3s;width:0}
.load-pct{font-size:13px;color:var(--muted)}
.load-err{color:var(--red)!important}
.hide{display:none}
@media (max-width:560px){ .tgrid{grid-template-columns:1fr} .s-mid{display:none} }
</style></head>
<body><div class="wrap">
<div class="tabs">
 <button class="tab on" id="t-picks" onclick="show('picks')">焦點</button>
 <button class="tab" id="t-sched" onclick="show('sched')">賽程</button>
 <button class="tab" id="t-rec" onclick="show('rec')">戰績</button>
 <button class="tab" id="t-wall" onclick="show('wall')">情報</button>
 <button class="tab" id="t-teams" onclick="show('teams')">球隊</button>
 <button class="tab icontab" id="t-admin" onclick="show('admin')" aria-label="設定" title="設定"></button>
 <button class="tab icontab" id="themebtn" onclick="toggleTheme()" aria-label="切換主題" title="切換深淺色"></button>
</div>
<button class="btn" onclick="startRefresh()"><span class="ico" style="width:17px;height:17px"></span><span>更新賠率及賽果</span></button>
<div id="view-picks"></div>
<div id="view-sched" class="hide"></div>
<div id="view-rec" class="hide"></div>
<div id="view-wall" class="hide"></div>
<div id="view-teams" class="hide"></div>
<div id="view-admin" class="hide"></div>
</div>
<div class="loadbox" id="loadbox"><div class="spin" id="loadspin"></div><div class="load-step" id="loadstep">更新中…</div><div class="load-bar"><div class="load-bar-fill" id="loadfill"></div></div><div class="load-pct" id="loadpct">0%</div></div>
<div class="needbox hide" id="needbox"></div>
<div class="overlay" id="overlay" onclick="closeDetail(event)"><div class="hint" id="backhint"></div><div id="detail" onclick="event.stopPropagation()"></div></div>

/* ---- 焦點(今日推介) ---- */
function renderPicks(){
  if(!M.length){ return '<div class="empty">暫無賽事或未取得賠率。<br>請按上方「更新賠率及賽果」,或於對話中要求更新。</div>'; }
  let h=''; let watch='';
  M.forEach((x,i)=>{ const p=x.main; if(!p) return;
    if(x.bet===false){
      watch+=`<div class="srow click" onclick="openDetail(${i})">
        <div class="s-time">${fmtKO(x.kickoff)}<div style="font-size:10px;color:var(--faint)">${esc(x.league)}</div></div>
        <div class="s-team">${esc(x.home)} <span class="vs">對</span> ${esc(x.away)}</div>
        <div class="s-right" style="font-size:12px"><b>${esc(p.market)} ${esc(p.selection)}</b> <span class="muted2">${p.odds!=null?'@'+p.odds+' · ':''}${p.p}%</span></div></div>`;
      return;
    }
    const placedPill=(x.placed&&x.placed.filter(p=>p.tier!=='角球實驗').length)?`<span class="pill steady" style="margin-right:6px">已落注 ${x.placed.filter(p=>p.tier!=='角球實驗').length} 注</span>`:'';
    h+=`<div class="mcard" onclick="openDetail(${i})">
      <div class="mc-top"><span class="mc-team">${esc(x.home)}<span class="vs">對</span>${esc(x.away)}</span><span class="mc-time">${placedPill}${fmtKO(x.kickoff)}${x.league?' · '+esc(x.league):''}</span></div>
      <div class="mc-pick"><span class="pill steady">主推</span>
        <div class="mc-sel"><div class="sel-txt">${esc(p.market)} ${esc(p.selection)}${p.vf?' <span class="vtag">值博</span>':''}${p.odds!=null?' <span class="odds">@'+p.odds+'</span>':''}</div>
          <div class="bar"><div class="bar-fill" style="width:${p.p}%;background:${confColor(p.p)}"></div></div></div>
        <div class="mc-stake"><div class="stk-lbl">命中率 ${p.p}%</div><div class="stk-amt">$${p.stake}</div></div>
      </div></div>`;
  });
  if(!h&&!watch) return '<div class="empty">暫無賽事或未取得賠率。</div>';
  if(!h) h='<div class="empty" style="margin-bottom:14px">落注聯賽暫無賽事(可於設定勾選聯賽)。</div>';
  if(watch) h+=`<div class="sgroup">其他聯賽 · 只睇盤,不落紙上注(想落注可於設定勾選)</div>`+watch;
  return h;
}

function betBox(x,b,cls,lbl,which){
  if(!b) return '';
  const src=(b.pm!=null&&b.pk!=null)?`(模型 ${b.pm} / 市場 ${b.pk})`:'';
  const vf=b.vf?`<span class="vtag">值博</span>`:'';
  const tierOf={main:'穩陣',longshot:'博冷',corner:'角球實驗'};
  const isPlaced=(x.placed||[]).some(p=>p.tier===tierOf[which]);
  let act='';
  if(!PUBLIC){
    if(which==='corner') act=`<span class="bb-sub" style="white-space:nowrap;text-align:right">實驗線自動記錄<br>不入資金池</span>`;
    else if(isPlaced) act=`<button class="abtn" style="border-color:var(--green);color:var(--green)" onclick='unplaceBet(${JSON.stringify(String(x.id))},${JSON.stringify(which)},event)'>已落注 ✓（撤）</button>`;
    else act=`<button class="abtn" style="border-color:var(--accent);color:var(--accent);font-size:13px;padding:7px 16px" onclick='placeBet(${JSON.stringify(String(x.id))},${JSON.stringify(which)},event)'>落注</button>`;
  }
  return `<div class="betbox ${cls}"><span class="pill ${cls}">${lbl}</span>
    <span class="bb-sel">${esc(b.market)} ${esc(b.selection)} ${vf}<span class="bb-sub">${b.odds!=null?'@'+b.odds+' · ':''}命中率 ${b.p}%${src}${b.ev!=null?' · '+evTxt(b.ev):''}</span></span>
    <span class="bb-amt"><div class="l">建議注碼</div><div class="a">$${b.stake}</div></span>${act}</div>`;
}
function placeBet(id,which,ev){
  if(ev) ev.stopPropagation();
  fetch('/place?id='+encodeURIComponent(id)+'&which='+which).then(r=>r.json()).then(j=>{
    if(j&&j.ok){ sessionStorage.setItem('reopen',id); location.reload(); }
    else alert('落唔到:'+((j&&j.err)||'?'));
  }).catch(()=>alert('未連接伺服器,請以桌面應用程式開啟。'));
}
function unplaceBet(id,which,ev){
  if(ev) ev.stopPropagation();
  fetch('/unplace?id='+encodeURIComponent(id)+'&which='+which).then(r=>r.json()).then(j=>{
    if(j&&j.ok){ sessionStorage.setItem('reopen',id); location.reload(); }
    else alert('撤唔到:'+((j&&j.err)||'?'));
  }).catch(()=>alert('未連接伺服器。'));
}

/* 賠率走勢 sparkline(主推 odds) */
function sparkHTML(hist){
  const pts=(hist||[]).filter(p=>p.pk!=null);
  if(pts.length<2) return '';
  const w=150,hh=30,pad=3;
  const vs=pts.map(p=>p.pk), mn=Math.min(...vs), mx=Math.max(...vs), rg=(mx-mn)||1;
  const xy=vs.map((v,i)=>`${pad+i*(w-2*pad)/(vs.length-1)},${hh-pad-(v-mn)/rg*(hh-2*pad)}`).join(' ');
  const d=vs[vs.length-1]-vs[0];
  const cls=d<0?'delta-dn':(d>0?'delta-up':'muted2');
  const arrow=d<0?'下調':(d>0?'上調':'持平');
  return `<div class="sec-h">主推賠率走勢 <span class="tag">· 開 ${vs[0]} → 現 ${vs[vs.length-1]}(${pts[0].t} 起)</span></div>
    <div style="display:flex;align-items:center;gap:12px">
      <svg viewBox="0 0 ${w} ${hh}" style="width:${w}px;height:${hh}px;flex-shrink:0"><polyline points="${xy}" fill="none" stroke="var(--accent)" stroke-width="1.8"/></svg>
      <span class="${cls}" style="font-size:12.5px">${arrow} ${d>0?'+':''}${d?d.toFixed(2):''}</span>
      <span class="muted2" style="font-size:11.5px">賠率下調=市場資金流向此選項</span>
    </div>`;
}

function detailHTML(x){

function researchBtn(x,label){
  if(PUBLIC) return '';
  return `<button class="rbtn" id="rbtn-${x.id}" onclick='startResearch(${JSON.stringify(String(x.id))},${JSON.stringify(x.home)},${JSON.stringify(x.away)},event)'>${label}</button>`;
}
function researchHTML(x){
  const r=x.research;
  if(!r){ return `<div class="note-empty"><b>尚未研究。</b>點擊下方按鈕,由 Opus(最強模型)即時深度推算:角球數、比賽流向、注碼建議及相關情報。</div>${researchBtn(x,'立即研究此場')}`; }
  let h='';
  if(r.picks&&r.picks.length){
    const ps=r.picks.map(p=>`<div class="opick"><span class="op-sel">${esc(p.market||'')} ${esc(p.selection||'')}</span>${p.conf?`<span class="op-conf">${esc(p.conf)}</span>`:''}<span class="op-stk">$${p.stake!=null?p.stake:'-'}</span></div>${p.reason?`<div class="op-reason">${esc(p.reason)}</div>`:''}`).join('');
    h+=`<div class="note note-opus"><div class="note-h">Opus 深度推介 <span style="font-weight:400;color:var(--muted);font-size:11px">· 最強模型 · 不影響主推及戰績</span></div>${ps}</div>`;
  }
  if(r.flow) h+=`<div class="note"><div class="note-h">比賽流向(Opus 推算)</div><div class="note-b">${esc(r.flow)}</div></div>`;
  if(r.form) h+=`<div class="note"><div class="note-h">球隊狀態</div><div class="note-b">${esc(r.form)}</div></div>`;
  if(r.motivation) h+=`<div class="note"><div class="note-h">取勝動機</div><div class="note-b">${esc(r.motivation)}</div></div>`;
  if(r.corner) h+=`<div class="note"><div class="note-h">角球推算</div><div class="note-b">${esc(r.corner)}</div></div>`;
  if(r.news&&r.news.length){ const ns=r.news.map(n=>(n&&n.url&&/^https?:\/\//.test(n.url))?`<a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.title||n.url)}</a>`:esc((n&&n.title)||n)).join('<br>');
    h+=`<div class="note"><div class="note-h">相關新聞</div><div class="note-b">${ns}</div></div>`; }
  return (h||'<div class="note-empty">未有研究內容。</div>')+researchBtn(x,'重新研究');
}
function startResearch(id,home,away,ev){
  if(ev) ev.stopPropagation();
  // 以「被按嗰粒掣」為準(情報頁同放大卡各有一粒,唔可以靠 id 搵)
  const btn=(ev&&(ev.currentTarget||ev.target))||document.getElementById('rbtn-'+id);
  const setTxt=(t)=>{ if(btn) btn.textContent=t; };
  fetch('/research?id='+encodeURIComponent(id)).then(r=>r.json()).then(j=>{
    if(!j||!j.ok) throw new Error((j&&j.err)||'fail');
    if(btn) btn.disabled=true;
    setTxt('Opus 深度研究中…約 2–3 分鐘(完成後自動更新,請耐心等候)');
    sessionStorage.setItem('reopen',id);
    let n=0; const t=setInterval(()=>{ n++;
      fetch('/research_status?id='+encodeURIComponent(id)).then(r=>r.json()).then(s=>{
        if(s.status==='done'){ clearInterval(t); setTxt('已完成,更新中…'); if(btn) btn.classList.add('rbtn-ok'); setTimeout(()=>location.reload(),700); }
        else if(s.status&&s.status.slice(0,5)==='error'){ clearInterval(t); if(btn){ btn.disabled=false; btn.title=s.status; } setTxt('未能取得:'+String(s.status).slice(6,90)); }
      }).catch(()=>{});
      if(n>150){ clearInterval(t); if(btn) btn.disabled=false; setTxt('逾時,請再試一次'); }
    },2000);
  }).catch(()=>{
    const cmd='研究 '+home+' 對 '+away;
    setTxt('未連接伺服器 — 請以桌面應用程式開啟;或於對話輸入「'+cmd+'」');
    if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(cmd).then(()=>setTxt('未連接伺服器,已複製「'+cmd+'」,貼上對話即可查詢')).catch(()=>{});
  });
}

/* ---- 賽程 ---- */
function schedRow(s){
  const up=!s.done;
  const idx=up?M.findIndex(m=>String(m.id)===String(s.id)):-1;
  const click=idx>=0?` class="srow click" onclick="openDetail(${idx})"`:' class="srow"';
  const ph=Math.round((s.ph||0)*100), pd=Math.round((s.pd||0)*100), pa=Math.round((s.pa||0)*100);
  const bar=(s.ph!=null)?`<div class="sbar"><div style="width:${ph}%;background:var(--b1)"></div><div style="width:${pd}%;background:var(--b2)"></div><div style="width:${pa}%;background:var(--b3)"></div></div>`:'';
  let mid='';
  if(s.main) mid=`<div class="s-mid"><div style="font-size:12px;font-weight:600">${esc(s.main.market)} ${esc(s.main.selection)}</div><div class="muted2" style="font-size:11px">${s.main.odds!=null?'@'+s.main.odds+' · ':''}${s.main.p!=null?s.main.p+'%':''}</div></div>`;
  else mid='<div class="s-mid muted2" style="font-size:11.5px">—</div>';
  let right='';
  if(s.done){
    right=`<div class="s-right"><div class="sc">${esc(s.score||'—')}</div><div class="muted2">${s.corners!=null?'角球 '+s.corners:''}</div></div>`;
  } else {
    let d='';
    if(s.delta!=null&&s.delta!==0){ const dn=s.delta<0; d=`<div class="${dn?'delta-dn':'delta-up'}">${dn?'▼':'▲'} ${Math.abs(s.delta).toFixed(2)}</div>`; }
    else if(s.delta_dir){ const dn=s.delta_dir<0; d=`<div class="${dn?'delta-dn':'delta-up'}">${dn?'▼':'▲'}</div>`; }
    right=`<div class="s-right">${d}<div class="muted2">${s.researched?'已研究':''}</div></div>`;
  }
  const rvBtn=(!PUBLIC&&s.done&&!s.review)?`<button class="abtn" onclick='startReview(${JSON.stringify(String(s.id))},event)' id="rv-${s.id}">檢討</button>`:'';
  let h=`<div${click}>
    <div class="s-time">${fmtKO(s.kickoff)}<div style="font-size:10px;color:var(--faint)">${esc(s.league||'')}${s.bet===false?' · 只睇':''}</div></div>
    <div class="s-team">${esc(s.home)} <span class="vs">對</span> ${esc(s.away)}${bar}</div>
    ${mid}${right}${rvBtn}</div>`;
  if(s.review) h+=`<div class="revtxt"><b>賽後檢討:</b>${esc(s.review)}</div>`;
  return h;
}
function renderSched(){
  if(!SCHED.length) return '<div class="empty">暫無賽程資料。</div>';
  const up=SCHED.filter(s=>!s.done), dn=SCHED.filter(s=>s.done);
  let h='';
  if(up.length){ h+=`<div class="sgroup">待賽(${up.length} 場)· 藍/灰/深灰 = 模型主勝/和/客勝機率,▼ = 主推賠率回落</div>`+up.map(schedRow).join(''); }
  if(dn.length){ h+=`<div class="sgroup">已完場(${dn.length} 場)</div>`+dn.slice().reverse().map(schedRow).join(''); }
  return h;
}
function startReview(id,ev){
  if(ev) ev.stopPropagation();
  const btn=(ev&&(ev.currentTarget||ev.target))||document.getElementById('rv-'+id); if(!btn) return;
  btn.disabled=true; btn.textContent='檢討中…';
  fetch('/review?id='+encodeURIComponent(id)).then(r=>r.json()).then(j=>{
    if(!j||!j.ok) throw new Error((j&&j.err)||'fail');
    let n=0; const t=setInterval(()=>{ n++;
      fetch('/review_status?id='+encodeURIComponent(id)).then(r=>r.json()).then(s=>{
        if(s.status==='done'){ clearInterval(t); location.reload(); }
        else if(s.status&&s.status.slice(0,5)==='error'){ clearInterval(t); btn.disabled=false; btn.textContent='再試'; btn.title=s.status; }
      }).catch(()=>{});
      if(n>90){ clearInterval(t); btn.disabled=false; btn.textContent='逾時'; }
    },2000);
  }).catch(e=>{ btn.disabled=false; btn.textContent='再試'; btn.title=String(e); });
}

/* ---- 戰績圖表(手寫 SVG,免外部庫) ---- */
function poolChart(rows){
  const rs=(rows||[]).filter(r=>r.pnl!=null&&r.tier!=='角球實驗').slice().reverse();   // 新→舊反轉做時序;實驗注不入池,走勢圖照剔
  if(rs.length<2) return '';
  let cum=500; const pts=[500];
  rs.forEach(r=>{ cum+=r.pnl; pts.push(Math.round(cum*10)/10); });
  const w=560,hh=150,pad=8;
  const mn=Math.min(...pts,500), mx=Math.max(...pts,500), rg=(mx-mn)||1;
  const X=i=>pad+i*(w-2*pad)/(pts.length-1), Y=v=>hh-pad-(v-mn)/rg*(hh-2*pad);
  const line=pts.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const base=Y(500).toFixed(1);
  const last=pts[pts.length-1], up=last>=500;
  return `<div class="chartbox"><div class="ch-t">紙上資金池走勢</div><div class="ch-s">起點 $500(虛線)· 每注結算後累計 · 現時 <b class="${up?'win':'lose'}">$${last}</b>(${rs.length} 注)</div>
    <svg viewBox="0 0 ${w} ${hh}">
      <line x1="${pad}" y1="${base}" x2="${w-pad}" y2="${base}" stroke="var(--faint)" stroke-width="1" stroke-dasharray="4 4"/>
      <polyline points="${line}" fill="none" stroke="${up?'var(--green)':'var(--red)'}" stroke-width="2"/>
      <circle cx="${X(pts.length-1).toFixed(1)}" cy="${Y(last).toFixed(1)}" r="3.2" fill="${up?'var(--green)':'var(--red)'}"/>
    </svg></div>`;
}
function calibChart(c){
  if(!c||!c.bins) return '';
  const bins=c.bins.filter(b=>b.n>0);
  if(!bins.length) return '';
  const w=560,hh=170,pad=26,bw=Math.min(52,(w-2*pad)/(bins.length*2.6));
  let bars='',labels='';
  bins.forEach((b,i)=>{
    const gx=pad+i*(w-2*pad)/bins.length+((w-2*pad)/bins.length-bw*2.2)/2;
    const hp=(b.pred||0)*(hh-2*pad), ha=(b.act||0)*(hh-2*pad);
    bars+=`<rect x="${gx.toFixed(1)}" y="${(hh-pad-hp).toFixed(1)}" width="${bw}" height="${hp.toFixed(1)}" fill="var(--b2)"/>`;
    bars+=`<rect x="${(gx+bw*1.2).toFixed(1)}" y="${(hh-pad-ha).toFixed(1)}" width="${bw}" height="${ha.toFixed(1)}" fill="var(--accent)"/>`;
    labels+=`<text x="${(gx+bw*1.1).toFixed(1)}" y="${hh-8}" font-size="10.5" fill="var(--muted)" text-anchor="middle">${Math.round(b.lo*100)}–${Math.round(b.hi*100)}%</text>`;
    labels+=`<text x="${(gx+bw*1.1).toFixed(1)}" y="${(hh-pad-Math.max(hp,ha)-5).toFixed(1)}" font-size="10" fill="var(--muted)" text-anchor="middle">${b.n}</text>`;
  });
  return `<div class="chartbox"><div class="ch-t">模型校準(可靠度)</div><div class="ch-s">將全部 ${c.n} 個模型預測按機率分桶:灰 = 平均預測機率,藍 = 實際發生頻率。兩者越貼近 = 模型越誠實;藍明顯矮過灰 = 過度自信。柱頂數字為樣本數。</div>
    <svg viewBox="0 0 ${w} ${hh}">${bars}${labels}
      <line x1="${pad}" y1="${hh-pad}" x2="${w-pad}" y2="${hh-pad}" stroke="var(--border)" stroke-width="1"/></svg>
    <div class="legend"><span><i style="background:var(--b2)"></i>預測</span><span><i style="background:var(--accent)"></i>實際</span><span class="muted2">樣本外 Brier ${c.brier!=null?c.brier.toFixed(3):'-'} · ${c.n_match||'-'} 場</span></div></div>`;
}

/* ---- 戰績 ---- */
function renderRecord(){
  const r=R; if(!r||!('hit' in r)) return '<div class="empty">暫無戰績紀錄。</div>';
  const sh=r.hit_steady||[0,0], lh=r.hit_longshot||[0,0];
  const poolTxt=`$${r.pool}`, pnlTxt=(r.pnl>=0?'+':'')+'$'+r.pnl;
  let h=`<div class="strip">
    <div class="kpi big"><div class="l">命中率(核心指標)</div><div class="v">${r.n_nb?r.hit+'%':'—'} <span class="x">· 穩陣 ${sh[1]?Math.round(sh[0]/sh[1]*100):0}% / 博冷 ${lh[1]?Math.round(lh[0]/lh[1]*100):0}%</span></div></div>
    <div class="kpi sm"><div class="l">紙上資金池(參考)</div><div class="v">${poolTxt} <span class="x">${pnlTxt}</span></div></div></div>`;
  h+='<div class="chips">';
  (r.bym_list||[]).forEach(b=>{
    const hit=b.hit!=null?b.hit+'%':(b.w+'/'+b.n);
    const ok=b.roi!=null&&b.roi>=0;
    const roi=b.roi!=null?` · ROI <span class="${ok?'win':'lose'}">${b.roi>=0?'+':''}${b.roi}%${ok?' · 保本':''}</span>`:'';
    h+=`<div class="chip"><b>${esc(b.g)}</b> 命中 ${hit}${roi} <span class="muted2">(${b.n} 注)</span></div>`;
  });
  const vs=r.value_split;
  if(vs&&vs.val&&vs.val.n){
    const vroi=vs.val.roi!=null?vs.val.roi:0, rroi=(vs.rest&&vs.rest.roi!=null)?vs.rest.roi:0;
    h+=`<div class="chips" style="margin-top:-2px">
      <div class="chip" style="border-color:var(--green)"><b>值博注</b>(混合期望值 ≥ +2%) 命中 ${vs.val.hit}% · 回報 <span class="${vroi>=0?'win':'lose'}">${vroi>=0?'+':''}${vroi}%</span> <span class="muted2">(${vs.val.n} 注)</span></div>
      <div class="chip"><b>其他注</b> 命中 ${vs.rest.hit!=null?vs.rest.hit:'-'}% · 回報 <span class="${rroi>=0?'win':'lose'}">${rroi>=0?'+':''}${rroi}%</span> <span class="muted2">(${vs.rest.n} 注)</span></div>
    </div>`;
  }
  if(r.exp&&r.exp.n_all){
    const eroi=r.exp.roi;
    const eroiTxt=eroi!=null?`<span class="${eroi>=0?'win':'lose'}">${eroi>=0?'+':''}${eroi}%</span>`:'<span class="muted2">—</span>';
    h+=`<div class="chips" style="margin-top:-2px">
      <div class="chip" style="border-color:var(--accent)"><b>角球實驗線</b>(不入資金池) 命中 ${r.exp.hit!=null?r.exp.hit+'%':'—'} · 回報 ${eroiTxt} <span class="muted2">(${r.exp.n} 注結算 / ${r.exp.n_all} 注)</span></div>
    </div>`;
  }
  h+='</div><div class="note-fine">命中率計法:半贏計半注、走盤不計,與預測勝率同一口徑。「值博」指混合機率計出的期望值不少於 +2%;「保本」指注碼加權回報率 ≥ 0。現時樣本尚少,所有比率須累積足夠數據方可下定論。</div>';
  h+=poolChart(r.rows);
  h+=calibChart(CALIB);
  // 補角球:已開賽但缺角球嘅場,直接輸入 + 儲存即更新戰績
  if(!PUBLIC && (r.corner_missing||[]).length){
    h+=`<div class="card"><h3 style="display:flex;align-items:center;justify-content:space-between;gap:8px">補角球數 <span style="font-weight:400;color:var(--muted);font-size:12px">· ${r.corner_missing.length} 場缺</span><button class="abtn" id="chasebtn" onclick="startChase()">AI 自動搜尋（Haiku）</button></h3>`;
    r.corner_missing.forEach(c=>{
      h+=`<div class="cfill"><span class="cf-m">${esc(c.home)} 對 ${esc(c.away)} <span class="muted2" style="font-weight:400">${c.date} · ${esc(c.score)}</span></span>
        <input id="cf-${c.mid}" type="number" inputmode="numeric" placeholder="全場角球" class="cf-in">
        <button class="cf-btn" onclick="submitCorner('${c.mid}')">儲存</button></div>`;
    });
    h+='</div>';
  }
  const rows=(r.rows||[]).map(x=>{
    const cls=(x.status==='win'||x.status==='half-win')?'win':((x.status==='lose'||x.status==='half-lose')?'lose':'muted2');
    const pnlC=x.pnl>0?'win':(x.pnl<0?'lose':'muted2');
    const res=x.score?`${x.score}${x.corners!=null?' · '+x.corners+'角':''}`:'—';
    const tier=x.tier==='博冷'?'博':(x.tier==='角球'?'角':(x.tier==='角球實驗'?'驗':'穩'));
    return `<tr><td>${esc(x.home)} 對 ${esc(x.away)}</td><td><span class="muted2">${tier}</span> ${esc(x.market)} ${esc(x.selection)}${x.odds!=null?' @'+x.odds:''}</td>
      <td class="num">${x.my_p??'-'}%</td><td class="${cls}">${esc(x.status_txt)}</td><td class="num">${res}</td>
      <td class="num ${pnlC}">${x.pnl!=null?(x.pnl>0?'+':'')+x.pnl:'—'}</td></tr>`;
  }).join('')||'<tr><td colspan="6" class="muted2" style="text-align:center;padding:22px">尚無已結算注項。</td></tr>';
  h+=`<div class="card"><table class="rtable"><thead><tr><th>賽事</th><th>注項</th><th class="num">預測勝率</th><th>結果</th><th class="num">賽果</th><th class="num">盈虧</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  const cmp = (r.brier!=null&&r.brier_mkt!=null)?(r.brier<r.brier_mkt?'· 勝市場':'· 負市場'):'';
  h+=`<details><summary>進階:校準 / Brier / CLV(模型準確度)</summary><div class="adv">
    ${r.brier!=null?`<b>Brier(校準):</b>本模型 ${r.brier} vs 市場去水 ${r.brier_mkt??'-'} ${cmp}（${r.n_mkt} 注可比;數值越低越準,0 為完美）<br>`:''}
    ${r.logloss!=null?`<b>LogLoss:</b>本模型 ${r.logloss}${r.logloss_mkt!=null?' vs 市場 '+r.logloss_mkt:''}（嚴罰過度自信,越低越佳）<br>`:''}
    ${r.avg_clv!=null?`<b>CLV:</b>平均 ${r.avg_clv>=0?'+':''}${r.avg_clv}%（${r.n_clv} 注;正值代表優於收市價,屬真實 edge 訊號）<br>`:''}
    <span class="muted2">命中率 = 勝出注項 ÷ 已結算注項(不計走盤)。注碼不影響命中率,只影響紙上資金池。</span>
  </div></details>`;
  return h;
}

/* ---- 情報牆 ---- */
function renderWall(){
  let h='';
  if(WPEND.length&&!PUBLIC){
    h+=`<div class="sgroup">待研究(${WPEND.length} 場)· 按掣由 Opus 深度研究,結果自動入牆</div>`;
    WPEND.forEach(x=>{
      h+=`<div class="srow"><div class="s-time">${fmtKO(x.kickoff)}</div><div class="s-team">${esc(x.home)} <span class="vs">對</span> ${esc(x.away)}</div>
        <button class="rbtn" style="margin:0;width:auto;padding:7px 16px;font-size:12.5px" id="rbtn-w-${x.id}" onclick='startResearch(${JSON.stringify(String(x.id))},${JSON.stringify(x.home)},${JSON.stringify(x.away)},event)'>研究</button></div>`;
    });
  }
  if(!WALL.length) return h||'<div class="empty">暫無研究情報。喺「焦點」放大任何一場,按「立即研究此場」,Opus 嘅深度分析會集中顯示喺呢度。</div>';
  h+=`<div class="sgroup">研究檔案(${WALL.length} 篇,新至舊)</div>`;
  WALL.forEach(x=>{
    const picks=(x.picks||[]).map(p=>`<span class="wchip">${esc(p.market||'')} ${esc(p.selection||'')} $${p.stake!=null?p.stake:'-'}</span>`).join('');
    const news=(x.news||[]).map(n=>(n&&n.url&&/^https?:\/\//.test(n.url))?`<a href="${esc(n.url)}" target="_blank" rel="noopener">· ${esc(n.title||n.url)}</a>`:'').join('');
    h+=`<div class="wcard">
      <div class="w-top"><span class="w-team">${esc(x.home)} <span class="vs">對</span> ${esc(x.away)}</span><span class="w-meta">${fmtKO(x.kickoff)}${x.done?' · 已完場':''}</span></div>
      ${x.corner_mu!=null?`<div class="w-chiprow"><span class="wchip">預期角球 ${x.corner_mu}</span>${picks}</div>`:(picks?`<div class="w-chiprow">${picks}</div>`:'')}
      ${x.flow?`<div class="w-body">${esc(x.flow)}</div>`:''}
      ${news?`<div class="w-news">${news}</div>`:''}
    </div>`;
  });
  return h;
}

/* ---- 球隊庫 ---- */
function renderTeams(){
  if(!TEAMS.length) return '<div class="empty">暫無球隊資料(FM 數據庫未涵蓋現役賽事隊伍)。</div>';
  let h=`<div class="note-fine" style="margin-top:0">陣容實力來自 FM2026 球員數據庫;標有「大軍」的隊伍,十一人只從網上查證的正式大軍名單中挑選。<b>僅供理解球隊,未經校準、不入主推模型</b>;實證顯示角球威脅指數與實際角球無關,參考時注意。</div><div class="tgrid">`;
  TEAMS.forEach((t,i)=>{
    const inj=t.injured.length, dbt=t.doubtful.length;
    const old=(t.stale!=null&&t.stale>=4);
    const gtag=t.grounded?`<span class="vtag" style="margin-left:6px">大軍</span>`:'';
    h+=`<div class="tcard" onclick="openTeam(${i})">
      <div class="t-name">${esc(t.zh)}${gtag}</div><div class="t-en">${esc(t.en)}</div>
      <div class="t-stats"><span><b>${t.rating!=null?t.rating:'-'}</b>陣容實力</span><span><b>${t.corner!=null?t.corner:'-'}</b>角球威脅</span><span><b>${t.grounded?(t.fm_n+'/'+t.squad_n):(t.n!=null?t.n:'-')}</b>${t.grounded?'大軍有評分':'庫內球員'}</span></div>
      ${(inj||dbt)?`<div class="t-inj" ${old?'style="color:var(--faint)"':''}>傷停 ${inj} 人${dbt?' · 有疑 '+dbt+' 人':''}${t.stale!=null?' · '+(t.stale===0?'今日':t.stale+' 日前')+(old?'(舊情報)':''):''}</div>`:'<div class="t-ok">暫無傷停情報</div>'}
    </div>`;
  });
  return h+'</div>';
}
function teamHTML(t){
  const rows=(t.xi||[]).map(p=>`<tr><td class="pos">${esc((p.pos||'').trim())}</td><td>${esc(p.name)}</td><td class="ca">${p.ca}</td></tr>`).join('');
  const inj=t.injured.map(esc).join('、'), dbt=t.doubtful.map(esc).join('、');
  const old=(t.stale!=null&&t.stale>=4);
  const ageTxt=t.stale!=null?(t.stale===0?'今日更新':t.stale+' 日前更新'+(old?',或已過時':'')):'';
  const xiTag=t.grounded
    ?`· 只計正式大軍名單內球員(${t.fm_n}/${t.squad_n} 人有 FM 評分${t.fetched?',名單 '+esc(t.fetched)+' 查證':''})`
    :'· 理論陣:FM 資料庫中該國最強,未必全部入選今屆大軍';
  return `<div class="detail">
    <div class="d-top"><div class="d-team">${esc(t.zh)} ${t.grounded?'<span class="vtag">大軍</span>':''} <span class="t-en" style="font-size:12px">${esc(t.en)}</span></div>
      <div class="d-time">陣容實力 ${t.rating!=null?t.rating:'-'} · 角球威脅 ${t.corner!=null?t.corner:'-'}</div></div>
    ${inj?`<div class="note" style="border-color:var(--red)"><div class="note-h" style="color:var(--red)">傷停(研究情報${ageTxt?' · '+ageTxt:''})</div><div class="note-b" ${old?'style="opacity:.6"':''}>${inj}</div></div>`:''}
    ${dbt?`<div class="note" style="border-color:var(--amber)"><div class="note-h" style="color:var(--amber)">上陣成疑${ageTxt?'('+ageTxt+')':''}</div><div class="note-b" ${old?'style="opacity:.6"':''}>${dbt}</div></div>`:''}
    <div class="sec-h">${t.grounded?'大軍中 FM 評分最高十一人':'推算最佳十一人'} <span class="tag">${xiTag}</span></div>
    <table class="xtable">${rows||'<tr><td class="muted2">無資料</td></tr>'}</table>
    ${(t.extra&&t.extra.length)?`<div class="sec-h">大軍其餘球員 <span class="tag">· FM 資料庫無此${t.extra.length}人評分</span></div><div class="note-b" style="font-size:12.5px;color:var(--muted);line-height:1.8">${t.extra.map(esc).join('、')}</div>`:''}
    <div class="note-fine" style="margin-top:12px">FM 屬性未經賽果校準,強隊機率會偏高;僅助理解質素差距,不代表賽果。</div>
  </div>`;
}
function openTeam(i){ document.getElementById('detail').innerHTML=teamHTML(TEAMS[i]); document.getElementById('overlay').classList.add('show'); document.getElementById('overlay').scrollTop=0; }

/* ---- AI 追賽果(Haiku) ---- */
function startChase(){
  const btn=document.getElementById('chasebtn'); if(!btn) return;
  btn.disabled=true; btn.textContent='Haiku 搜尋中…';
  fetch('/chase').then(r=>r.json()).then(j=>{
    if(!j||!j.ok) throw new Error((j&&j.err)||'fail');
    let n=0; const t=setInterval(()=>{ n++;
      fetch('/chase_status').then(r=>r.json()).then(s=>{
        if(s.status==='done'){ clearInterval(t); btn.textContent='完成,更新中…'; setTimeout(()=>location.reload(),600); }
        else if(s.status&&s.status.slice(0,5)==='error'){ clearInterval(t); btn.disabled=false; btn.textContent='再試'; btn.title=s.status; }
        else if(s.step){ btn.textContent=s.step; }
      }).catch(()=>{});
      if(n>150){ clearInterval(t); btn.disabled=false; btn.textContent='逾時,再試'; }
    },2000);
  }).catch(()=>{ btn.disabled=false; btn.textContent='未連接伺服器'; });
}

/* ---- 檢視切換 ---- */
function openDetail(i){ document.getElementById('detail').innerHTML=detailHTML(M[i]); document.getElementById('overlay').classList.add('show'); document.getElementById('overlay').scrollTop=0; }
function closeDetail(e){ if(e&&e.target.id!=='overlay') return; document.getElementById('overlay').classList.remove('show'); }
function show(v){
  ['picks','sched','rec','wall','teams','admin'].forEach(x=>{
    const el=document.getElementById('view-'+x); if(el) el.classList.toggle('hide',v!==x);
    const t=document.getElementById('t-'+x); if(t) t.classList.toggle('on',v===x);
  });
  if(v==='admin') renderAdmin();
}
function renderAdmin(){
  const box=document.getElementById('view-admin');
  box.innerHTML=`<div class="card"><h3>AI 分工</h3><div class="muted2" style="font-size:13px;margin-bottom:4px">按工作所需能力配置模型,慳用量、事半功倍。</div>
    <table class="aitable">
      <tr><th>模型</th><th>負責</th><th>喺邊度用</th></tr>
      <tr><td><span class="mtag hk">Haiku</span><div class="muted2" style="font-size:11px;margin-top:3px">快而平</div></td><td>追賽果、補角球數(網上搜尋,搵唔到如實回報、絕不作數)</td><td>戰績頁「AI 自動搜尋」</td></tr>
      <tr><td><span class="mtag sn">Sonnet</span><div class="muted2" style="font-size:11px;margin-top:3px">中量</div></td><td>賽後檢討(對比賽前預測與實際賽果,總結一課)</td><td>賽程頁已完場「檢討」掣</td></tr>
      <tr><td><span class="mtag op">Opus</span><div class="muted2" style="font-size:11px;margin-top:3px">最強</div></td><td>賽前深度研究:角球數推算、比賽流向、注碼建議、傷兵情報</td><td>焦點卡「立即研究此場」/ 情報頁「研究」</td></tr>
    </table></div>
    <div class="card"><h3>揀選要落注的賽事</h3><div class="muted2" style="font-size:13px;margin-bottom:13px">全部聯賽都會自動抓取、分析及顯示(焦點頁「其他聯賽」段/賽程頁);勾選的聯賽先會出紙上注入戰績與資金池。修改後按「儲存」,再按「更新賠率及賽果」即可生效。</div><div id="comps" class="muted2">正在取得馬會賽事清單…</div></div>`;
  fetch('/competitions').then(r=>r.json()).then(j=>{
    if(!j||!j.ok){ document.getElementById('comps').innerHTML='<span class="lose">'+esc((j&&j.err)||'未能取得清單')+'</span>'; return; }
    window.__comps=j.comps.map(c=>({...c})); drawComps();
  }).catch(()=>{ document.getElementById('comps').innerHTML='<span class="muted2">未連接伺服器。請以桌面應用程式開啟,或使用「揀賽事」程式修改。</span>'; });
}
function drawComps(){
  const cs=window.__comps||[];
  const rows=cs.map((c,i)=>`<label class="comprow ${c.on?'on':''}" onclick="window.__comps[${i}].on=!window.__comps[${i}].on;drawComps()"><span class="cb">${c.on?'✓':''}</span><span class="cc">${esc(c.code)}</span><span class="cn">${esc(c.name)}</span><span class="cnum">${c.n} 場</span></label>`).join('');
  const n=cs.filter(c=>c.on).length;
  document.getElementById('comps').innerHTML=rows+`<div style="margin-top:15px;display:flex;gap:11px;align-items:center"><button class="btn" style="width:auto;margin:0;padding:9px 20px" onclick="saveFilter()">儲存（${n} 個）</button><span class="muted2" id="savemsg" style="font-size:13px"></span></div>`;
}
function saveFilter(){
  const codes=(window.__comps||[]).filter(c=>c.on).map(c=>c.code);
  if(!codes.length){ alert('請至少勾選一項賽事'); return; }
  fetch('/save_filter?codes='+encodeURIComponent(codes.join(','))).then(r=>r.json()).then(j=>{
    document.getElementById('savemsg').textContent=(j&&j.ok)?'已儲存,按上方「更新賠率及賽果」即可生效':'發生錯誤:'+((j&&j.err)||'');
  }).catch(()=>{ document.getElementById('savemsg').textContent='未連接伺服器'; });
}
function savePNG(name,ev){
  if(ev) ev.stopPropagation();
  const el=document.querySelector('#detail .detail');
  if(!el) return;
  if(!window.html2canvas){ alert('圖片功能載入中,請稍候再試。'); return; }
  const bg=getComputedStyle(document.documentElement).getPropertyValue('--surface').trim()||'#1b1e25';
  const fn=(name||'推介').replace(/[\\/:*?"<>|\s]/g,'');
  html2canvas(el,{backgroundColor:bg,scale:2,useCORS:true}).then(c=>{
    const dataurl=c.toDataURL('image/png');
    if(window.pywebview&&window.pywebview.api&&window.pywebview.api.save_png){
      window.pywebview.api.save_png(fn,dataurl).then(r=>{ if(r&&r.ok) alert('已儲存:'+r.path); else if(r&&r.err) alert('儲存失敗:'+r.err); });
    } else {
      const a=document.createElement('a'); a.download=fn+'.png'; a.href=dataurl; a.click();
    }
  }).catch(e=>alert('產生圖片失敗:'+e));
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.getElementById('overlay').classList.remove('show'); });
document.getElementById('view-picks').innerHTML=renderPicks();
document.getElementById('view-sched').innerHTML=renderSched();
document.getElementById('view-rec').innerHTML=renderRecord();
document.getElementById('view-wall').innerHTML=renderWall();
document.getElementById('view-teams').innerHTML=renderTeams();
(function(){const id=sessionStorage.getItem('reopen');if(id){sessionStorage.removeItem('reopen');const i=M.findIndex(m=>String(m.id)===String(id));if(i>=0)openDetail(i);}})();
function renderNeeds(){
  const box=document.getElementById('needbox');
  if(PUBLIC){ box.classList.add('hide'); return; }
  const ns=(DATA&&DATA.needs)||[];
  if(!ns.length){ box.classList.add('hide'); return; }
  box.classList.remove('hide');
  box.innerHTML=`<div class="nb-h"><span style="display:flex;align-items:center;gap:6px">${ic('warn',16)} ${ns.length} 場賽果未齊</span><span style="display:flex;gap:8px;align-items:center"><button class="abtn" id="chasebtn2" onclick="startChase2()">AI 搜尋</button><span class="nb-x" onclick="document.getElementById('needbox').classList.add('hide')">${ic('close',15)}</span></span></div>`+
    ns.map(n=>{
      const q=encodeURIComponent(n.home+' '+n.away+' world cup full time score corners');
      const scoreRow=n.miss.includes('score')?`<div class="nb-row"><label>比數(主-客)</label><input id="ms-${n.id}" placeholder="例 2-1"></div>`:`<div class="nb-row"><label>比數</label><span class="muted2">${esc(n.score||'')}</span></div>`;
      const cornerRow=n.miss.includes('corners')?`<div class="nb-row"><label>全場角球</label><input id="mc-${n.id}" type="number" inputmode="numeric" placeholder="例 9"></div>`:'';
      return `<div class="nb-item"><div class="nb-match">${esc(n.home)} 對 ${esc(n.away)} <span class="muted2" style="font-weight:400">${n.kickoff} · ${n.days} 日前</span></div>
        ${n.note?`<div class="muted2" style="font-size:11.5px;margin-bottom:6px">${esc(n.note)}</div>`:''}
        ${scoreRow}${cornerRow}
        <div class="nb-act"><a class="nb-search" href="https://www.google.com/search?q=${q}" target="_blank" rel="noopener">${ic('search',14)} 網上搜尋</a><button onclick="submitResult('${n.id}')">提交</button></div></div>`;
    }).join('');
}
function startChase2(){
  const btn=document.getElementById('chasebtn2'); if(!btn) return;
  btn.disabled=true; btn.textContent='搜尋中…';
  fetch('/chase').then(r=>r.json()).then(j=>{
    if(!j||!j.ok) throw new Error('fail');
    let n=0; const t=setInterval(()=>{ n++;
      fetch('/chase_status').then(r=>r.json()).then(s=>{
        if(s.status==='done'){ clearInterval(t); setTimeout(()=>location.reload(),500); }
        else if(s.status&&s.status.slice(0,5)==='error'){ clearInterval(t); btn.disabled=false; btn.textContent='再試'; btn.title=s.status; }
      }).catch(()=>{});
      if(n>150){ clearInterval(t); btn.disabled=false; btn.textContent='逾時'; }
    },2000);
  }).catch(()=>{ btn.disabled=false; btn.textContent='未連接'; });
}
function submitResult(id){
  const sc=document.getElementById('ms-'+id), cc=document.getElementById('mc-'+id);
  const parts=[];
  if(sc&&sc.value.trim()) parts.push('score='+encodeURIComponent(sc.value.trim()));
  if(cc&&cc.value.trim()) parts.push('corners='+encodeURIComponent(cc.value.trim()));
  if(!parts.length){ alert('請先填寫比數或角球數。'); return; }
  fetch('/manual_result?id='+encodeURIComponent(id)+'&'+parts.join('&')).then(r=>r.json()).then(j=>{
    if(j&&j.ok){ location.reload(); } else { alert('發生錯誤:'+((j&&j.err)||'?')); }
  }).catch(()=>{
    const t=id+' 賽果:'+(sc&&sc.value?'比數 '+sc.value+' ':'')+(cc&&cc.value?'角球 '+cc.value:'');
    if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(t);
    alert('未連接伺服器,已複製,請貼上對話代填:\n'+t);
  });
}
function submitCorner(id){
  const inp=document.getElementById('cf-'+id);
  if(!inp||!inp.value.trim()){ alert('請先填寫全場角球數。'); return; }
  const btn=inp.nextElementSibling; if(btn){ btn.disabled=true; btn.textContent='儲存中…'; }
  fetch('/manual_result?id='+encodeURIComponent(id)+'&corners='+encodeURIComponent(inp.value.trim()))
    .then(r=>r.json()).then(j=>{ if(j&&j.ok){ location.reload(); } else { alert('發生錯誤:'+((j&&j.err)||'?')); if(btn){btn.disabled=false;btn.textContent='儲存';} } })
    .catch(()=>{ alert('未連接伺服器。請以桌面應用程式開啟。'); if(btn){btn.disabled=false;btn.textContent='儲存';} });
}
function _loadErr(msg){
  document.getElementById('loadspin').style.display='none';
  const s=document.getElementById('loadstep'); s.classList.add('load-err');
  s.innerHTML=msg+'<br><br><span style="color:var(--accent);cursor:pointer" onclick="document.getElementById(\'loadbox\').classList.remove(\'show\')">關閉</span>';
}
function startRefresh(){
  const box=document.getElementById('loadbox'); box.classList.add('show');
  document.getElementById('loadspin').style.display='block';
  const s=document.getElementById('loadstep'); s.classList.remove('load-err'); s.textContent='開始更新…';
  document.getElementById('loadfill').style.width='0%'; document.getElementById('loadpct').textContent='0%';
  fetch('/refresh').then(r=>r.json()).then(j=>{ if(!j||!j.ok) throw 0; pollRefresh(); })
    .catch(()=>_loadErr('未連接更新伺服器。<br>請以桌面應用程式開啟,或於對話中要求更新賠率。'));
}
function pollRefresh(){
  const t=setInterval(()=>{
    fetch('/refresh_status').then(r=>r.json()).then(s=>{
      document.getElementById('loadstep').textContent=s.step||'更新中…';
      document.getElementById('loadfill').style.width=(s.pct||0)+'%';
      document.getElementById('loadpct').textContent=(s.pct||0)+'%';
      if(s.status==='done'){ clearInterval(t); document.getElementById('loadstep').textContent='完成,正在載入…'; setTimeout(()=>location.reload(),500); }
      else if(s.status==='error'){ clearInterval(t); _loadErr(esc(s.step||'更新發生錯誤')); }
    }).catch(()=>{});
  },800);
}
renderNeeds();
